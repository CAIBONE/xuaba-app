<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学吧 - 管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .header h1 { color: #333; margin-bottom: 10px; }
    .auth-section { display: flex; gap: 10px; align-items: center; }
    .auth-section input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
    .auth-section button { padding: 8px 20px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card h3 { color: #666; font-size: 14px; margin-bottom: 10px; }
    .card .value { font-size: 32px; font-weight: bold; color: #1890ff; }
    .section { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .section h2 { color: #333; margin-bottom: 15px; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: #fafafa; font-weight: 500; color: #666; }
    .hidden { display: none; }
    .error { color: #ff4d4f; padding: 10px; background: #fff2f0; border-radius: 4px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>学吧 - 管理后台</h1>
      <div class="auth-section">
        <input type="password" id="adminKey" placeholder="输入管理员密钥">
        <button onclick="authenticate()">登录</button>
      </div>
    </div>

    <div id="dashboard" class="hidden">
      <div class="dashboard">
        <div class="card">
          <h3>用户总数</h3>
          <div class="value" id="userCount">-</div>
        </div>
        <div class="card">
          <h3>项目总数</h3>
          <div class="value" id="projectCount">-</div>
        </div>
        <div class="card">
          <h3>知识点总数</h3>
          <div class="value" id="nodeCount">-</div>
        </div>
        <div class="card">
          <h3>教材总数</h3>
          <div class="value" id="contentCount">-</div>
        </div>
        <div class="card">
          <h3>测验总数</h3>
          <div class="value" id="quizCount">-</div>
        </div>
      </div>

      <div class="section">
        <h2>用户列表</h2>
        <table id="usersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>昵称</th>
              <th>注册时间</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h2>项目列表</h2>
        <table id="projectsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>用户</th>
              <th>科目</th>
              <th>目标</th>
              <th>知识点</th>
              <th>学时</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="section">
        <h2>系统信息</h2>
        <div id="systemInfo"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:8000/api/admin';
    let adminKey = '';

    async function authenticate() {
      adminKey = document.getElementById('adminKey').value;
      try {
        await loadDashboard();
        document.getElementById('dashboard').classList.remove('hidden');
      } catch (err) {
        alert('认证失败：' + err.message);
      }
    }

    async function apiCall(endpoint) {
      const response = await fetch(`${API_BASE}${endpoint}`, {
        headers: { 'X-Admin-Key': adminKey }
      });
      if (!response.ok) {
        throw new Error(`API error: ${response.status}`);
      }
      return response.json();
    }

    async function loadDashboard() {
      try {
        const dashboard = await apiCall('/dashboard');
        document.getElementById('userCount').textContent = dashboard.user_count;
        document.getElementById('projectCount').textContent = dashboard.project_count;
        document.getElementById('nodeCount').textContent = dashboard.node_count;
        document.getElementById('contentCount').textContent = dashboard.content_count;
        document.getElementById('quizCount').textContent = dashboard.quiz_count;

        const users = await apiCall('/users');
        const usersBody = document.querySelector('#usersTable tbody');
        usersBody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.nickname || '未设置'}</td>
            <td>${new Date(u.created_at).toLocaleString()}</td>
          </tr>
        `).join('');

        const projects = await apiCall('/projects');
        const projectsBody = document.querySelector('#projectsTable tbody');
        projectsBody.innerHTML = projects.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.user_id}</td>
            <td>${p.subject}</td>
            <td>${p.goal_description.substring(0, 30)}...</td>
            <td>${p.tree_total_nodes}</td>
            <td>${p.tree_total_hours}h</td>
          </tr>
        `).join('');

        const system = await apiCall('/system');
        document.getElementById('systemInfo').innerHTML = `
          <p><strong>应用名称：</strong>${system.app_name}</p>
          <p><strong>版本：</strong>${system.app_version}</p>
          <p><strong>LLM 提供商：</strong>${system.llm_provider}</p>
          <p><strong>LLM 模型：</strong>${system.llm_model}</p>
          <p><strong>调试模式：</strong>${system.debug_mode ? '开启' : '关闭'}</p>
        `;
      } catch (err) {
        console.error('加载仪表板失败:', err);
      }
    }
  </script>
</body>
</html>
