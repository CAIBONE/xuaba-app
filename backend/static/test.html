<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学吧 - Web 测试界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h1 { color: #333; margin-bottom: 10px; }
        .auth-section { display: flex; gap: 10px; align-items: center; }
        .auth-section input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; }
        .auth-section button { padding: 8px 20px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .auth-section button:hover { background: #40a9ff; }
        .token-display { margin-top: 10px; font-size: 12px; color: #666; word-break: break-all; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { padding: 10px 20px; background: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .tab.active { background: #1890ff; color: #fff; }
        .tab-content { display: none; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .section { margin-bottom: 20px; }
        .section h2 { margin-bottom: 10px; color: #333; font-size: 18px; }
        .btn { padding: 8px 16px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        .btn:hover { background: #40a9ff; }
        .btn-secondary { background: #fff; color: #1890ff; border: 1px solid #1890ff; }
        .project-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .project-card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        .project-card:hover { border-color: #1890ff; }
        .project-card h3 { margin-bottom: 5px; }
        .project-card p { color: #666; font-size: 14px; }
        .tree-view { max-height: 500px; overflow-y: auto; }
        .node-item { padding: 10px; border-left: 3px solid #1890ff; margin-bottom: 5px; background: #fafafa; }
        .node-item.level-0 { margin-left: 0; }
        .node-item.level-1 { margin-left: 20px; }
        .node-item.level-2 { margin-left: 40px; }
        .content-view { border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
        .content-view h3 { margin-bottom: 15px; }
        .content-section { margin-bottom: 20px; }
        .content-section h4 { margin-bottom: 10px; color: #1890ff; }
        .content-text { line-height: 1.8; color: #333; }
        .notes-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .note-item { padding: 10px; background: #fffbe6; border-left: 3px solid #faad14; margin-bottom: 10px; }
        .note-item.highlight { background: #e6f7ff; border-left-color: #1890ff; }
        .chat-container { display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        .chat-message { margin-bottom: 15px; }
        .chat-message.user { text-align: right; }
        .chat-message .bubble { display: inline-block; padding: 10px 15px; border-radius: 18px; max-width: 70%; }
        .chat-message.user .bubble { background: #1890ff; color: #fff; }
        .chat-message.assistant .bubble { background: #f0f0f0; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .quiz-container { }
        .question-card { padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; }
        .question-card h4 { margin-bottom: 10px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 10px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
        .option:hover { border-color: #1890ff; }
        .option.selected { background: #e6f7ff; border-color: #1890ff; }
        .feedback-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .feedback-btn { padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; }
        .feedback-btn:hover { border-color: #1890ff; }
        .feedback-btn.active { background: #1890ff; color: #fff; }
        .loading { text-align: center; padding: 20px; color: #999; }
        .error { color: #ff4d4f; padding: 10px; background: #fff2f0; border-radius: 4px; margin-bottom: 10px; }
        .success { color: #52c41a; padding: 10px; background: #f6ffed; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>学吧 - Web 测试界面</h1>
            <div class="auth-section">
                <input type="text" id="loginCode" placeholder="登录 code (任意值)" value="test_user">
                <button onclick="login()">登录</button>
                <button onclick="logout()" class="btn-secondary">登出</button>
            </div>
            <div class="token-display" id="tokenDisplay"></div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('projects')">项目列表</button>
            <button class="tab" onclick="switchTab('tree')">知识图谱</button>
            <button class="tab" onclick="switchTab('content')">教材内容</button>
            <button class="tab" onclick="switchTab('chat')">AI 对话</button>
            <button class="tab" onclick="switchTab('quiz')">测验</button>
        </div>

        <div id="projectsTab" class="tab-content active">
            <div class="section">
                <h2>我的学习项目</h2>
                <button class="btn" onclick="createProject()">创建项目</button>
                <button class="btn btn-secondary" onclick="loadProjects()">刷新</button>
            </div>
            <div id="projectList" class="project-list"></div>
        </div>

        <div id="treeTab" class="tab-content">
            <div class="section">
                <h2>知识图谱</h2>
                <button class="btn" onclick="generateTree()">生成知识图谱</button>
                <button class="btn btn-secondary" onclick="loadTree()">刷新</button>
            </div>
            <div id="treeView" class="tree-view"></div>
        </div>

        <div id="contentTab" class="tab-content">
            <div class="section">
                <h2>教材内容</h2>
                <button class="btn" onclick="generateContent()">生成教材</button>
                <button class="btn btn-secondary" onclick="loadContent()">刷新</button>
            </div>
            <div id="contentView" class="content-view"></div>
            <div class="notes-section">
                <h3>笔记与划线</h3>
                <div style="margin-bottom: 10px;">
                    <input type="text" id="noteInput" placeholder="输入笔记内容" style="padding: 8px; width: 300px; border: 1px solid #ddd; border-radius: 4px;">
                    <button class="btn" onclick="addNote()">添加笔记</button>
                </div>
                <div id="notesList"></div>
            </div>
        </div>

        <div id="chatTab" class="tab-content">
            <div class="section">
                <h2>AI 学习助手</h2>
                <p style="color: #666; margin-bottom: 10px;">基于项目知识点和用户画像的智能对话</p>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter')sendMessage()">
                    <button class="btn" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>

        <div id="quizTab" class="tab-content">
            <div class="section">
                <h2>测验</h2>
                <button class="btn" onclick="generateQuiz()">生成测验</button>
                <button class="btn btn-secondary" onclick="loadQuiz()">刷新</button>
            </div>
            <div id="quizView" class="quiz-container"></div>
            <div style="margin-top: 20px;">
                <button class="btn" onclick="submitQuiz()">提交答案</button>
                <button class="btn" onclick="submitFeedback()">提交反馈</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let token = localStorage.getItem('token');
        let currentProjectId = null;
        let currentContentId = null;
        let currentQuizId = null;
        let chatHistory = [];
        let userAnswers = {};
        let userFeedback = {};

        if (token) {
            document.getElementById('tokenDisplay').textContent = 'Token: ' + token.substring(0, 30) + '...';
            loadProjects();
        }

        async function apiCall(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const response = await fetch(API_BASE + endpoint, { ...options, headers });
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'API 调用失败');
            }
            return response.json();
        }

        async function login() {
            const code = document.getElementById('loginCode').value;
            try {
                const data = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ code })
                });
                token = data.access_token;
                localStorage.setItem('token', token);
                document.getElementById('tokenDisplay').textContent = 'Token: ' + token.substring(0, 30) + '...';
                loadProjects();
            } catch (error) {
                alert('登录失败: ' + error.message);
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            document.getElementById('tokenDisplay').textContent = '';
            document.getElementById('projectList').innerHTML = '';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }

        async function loadProjects() {
            try {
                const data = await apiCall('/projects');
                const html = data.items.map(p => `
                    <div class="project-card" onclick="selectProject(${p.id})">
                        <h3>${p.subject}</h3>
                        <p>${p.goal_description}</p>
                        <p style="margin-top: 5px; font-size: 12px; color: #999;">
                            截止日期: ${p.deadline || '未设置'}
                        </p>
                    </div>
                `).join('');
                document.getElementById('projectList').innerHTML = html || '<p>暂无项目</p>';
            } catch (error) {
                document.getElementById('projectList').innerHTML = '<div class="error">' + error.message + '</div>';
            }
        }

        async function createProject() {
            const subject = prompt('科目名称:', '中级经济师');
            if (!subject) return;
            const goal = prompt('学习目标:', '零基础通过考试');
            if (!goal) return;
            try {
                await apiCall('/projects', {
                    method: 'POST',
                    body: JSON.stringify({
                        subject,
                        goal_description: goal,
                        goal_type: 'exam',
                        deadline: '2026-12-31'
                    })
                });
                loadProjects();
            } catch (error) {
                alert('创建失败: ' + error.message);
            }
        }

        function selectProject(id) {
            currentProjectId = id;
            switchTab('tree');
            loadTree();
        }

        async function generateTree() {
            if (!currentProjectId) { alert('请先选择项目'); return; }
            try {
                await apiCall(`/projects/${currentProjectId}/generate-tree`, { method: 'POST' });
                loadTree();
            } catch (error) {
                alert('生成失败: ' + error.message);
            }
        }

        async function loadTree() {
            if (!currentProjectId) return;
            try {
                const data = await apiCall(`/nodes/project/${currentProjectId}/tree`);
                const html = data.nodes.map(n => `
                    <div class="node-item level-${n.level}" onclick="selectNode(${n.id})">
                        <strong>[${n.node_key}] ${n.title}</strong>
                        <p style="font-size: 14px; color: #666; margin-top: 5px;">${n.description || ''}</p>
                        <p style="font-size: 12px; color: #999; margin-top: 5px;">
                            预计 ${n.estimated_minutes} 分钟 | 掌握度: ${(n.mastery_level * 100).toFixed(0)}%
                        </p>
                    </div>
                `).join('');
                document.getElementById('treeView').innerHTML = html || '<p>暂无知识点</p>';
            } catch (error) {
                document.getElementById('treeView').innerHTML = '<div class="error">' + error.message + '</div>';
            }
        }

        async function selectNode(nodeId) {
            currentContentId = nodeId;
            switchTab('content');
            loadContent();
            loadNotes();
        }

        async function generateContent() {
            if (!currentContentId) { alert('请先选择知识点'); return; }
            try {
                const data = await apiCall('/contents/generate', {
                    method: 'POST',
                    body: JSON.stringify({ node_id: currentContentId, content_type: 'lesson' })
                });
                loadContent();
            } catch (error) {
                alert('生成失败: ' + error.message);
            }
        }

        async function loadContent() {
            if (!currentContentId) return;
            try {
                const data = await apiCall(`/contents/node/${currentContentId}`);
                if (data.items.length === 0) {
                    document.getElementById('contentView').innerHTML = '<p>暂无教材，点击"生成教材"按钮生成</p>';
                    return;
                }
                const content = data.items[0];
                currentContentId = content.node_id;
                const sections = content.content_json.sections.map(s => `
                    <div class="content-section">
                        <h4>${s.heading}</h4>
                        <div class="content-text">${s.content}</div>
                    </div>
                `).join('');
                document.getElementById('contentView').innerHTML = `
                    <h3>${content.title}</h3>
                    <p style="color: #666; margin-bottom: 15px;">字数: ${content.word_count}</p>
                    ${sections}
                `;
            } catch (error) {
                document.getElementById('contentView').innerHTML = '<div class="error">' + error.message + '</div>';
            }
        }

        async function addNote() {
            const text = document.getElementById('noteInput').value;
            if (!text) { alert('请输入笔记内容'); return; }
            try {
                await apiCall(`/contents/${currentContentId}/notes`, {
                    method: 'POST',
                    body: JSON.stringify({ note_type: 'note', text })
                });
                document.getElementById('noteInput').value = '';
                loadNotes();
            } catch (error) {
                alert('添加失败: ' + error.message);
            }
        }

        async function loadNotes() {
            if (!currentContentId) return;
            try {
                const data = await apiCall(`/contents/${currentContentId}/notes`);
                const html = data.items.map(n => `
                    <div class="note-item ${n.note_type}">
                        <p>${n.text}</p>
                        <p style="font-size: 12px; color: #999; margin-top: 5px;">
                            ${n.note_type} | ${new Date(n.created_at).toLocaleString()}
                        </p>
                    </div>
                `).join('');
                document.getElementById('notesList').innerHTML = html || '<p>暂无笔记</p>';
            } catch (error) {
                document.getElementById('notesList').innerHTML = '<div class="error">' + error.message + '</div>';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            if (!currentProjectId) { alert('请先选择项目'); return; }

            input.value = '';
            chatHistory.push({ role: 'user', content: message });
            renderChat();

            try {
                const data = await apiCall(`/chat/${currentProjectId}?message=${encodeURIComponent(message)}`, {
                    method: 'POST'
                });
                chatHistory.push({ role: 'assistant', content: data.reply });
                renderChat();
            } catch (error) {
                chatHistory.push({ role: 'assistant', content: '错误: ' + error.message });
                renderChat();
            }
        }

        function renderChat() {
            const html = chatHistory.map(m => `
                <div class="chat-message ${m.role}">
                    <div class="bubble">${m.content}</div>
                </div>
            `).join('');
            const container = document.getElementById('chatMessages');
            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        async function generateQuiz() {
            if (!currentContentId) { alert('请先选择知识点'); return; }
            try {
                const data = await apiCall('/quizzes/generate', {
                    method: 'POST',
                    body: JSON.stringify({ node_id: currentContentId, question_count: 5, quiz_type: 'practice' })
                });
                currentQuizId = data.id;
                loadQuiz();
            } catch (error) {
                alert('生成失败: ' + error.message);
            }
        }

        async function loadQuiz() {
            if (!currentQuizId) return;
            try {
                const data = await apiCall(`/quizzes/${currentQuizId}`);
                userAnswers = {};
                userFeedback = {};
                const html = data.questions.map((q, i) => `
                    <div class="question-card">
                        <h4>第 ${i + 1} 题: ${q.type === 'choice' ? '选择题' : '简答题'}</h4>
                        <p style="margin-bottom: 10px;">${q.content}</p>
                        ${q.type === 'choice' ? `
                            <div class="options">
                                ${q.options.map((opt, j) => `
                                    <div class="option" onclick="selectAnswer(${i}, ${j})" data-q="${i}" data-o="${j}">
                                        ${String.fromCharCode(65 + j)}. ${opt}
                                    </div>
                                `).join('')}
                            </div>
                        ` : `
                            <textarea id="answer_${i}" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" rows="3"></textarea>
                        `}
                        <div class="feedback-buttons">
                            <button class="feedback-btn" onclick="setFeedback(${i}, 'confused')">😕 不了解</button>
                            <button class="feedback-btn" onclick="setFeedback(${i}, 'familiar')">😊 熟知</button>
                            <button class="feedback-btn" onclick="setFeedback(${i}, 'unclear')">🤔 题目不清</button>
                        </div>
                    </div>
                `).join('');
                document.getElementById('quizView').innerHTML = html;
            } catch (error) {
                document.getElementById('quizView').innerHTML = '<div class="error">' + error.message + '</div>';
            }
        }

        function selectAnswer(qIndex, oIndex) {
            userAnswers[qIndex] = String.fromCharCode(65 + oIndex);
            document.querySelectorAll(`[data-q="${qIndex}"]`).forEach(el => el.classList.remove('selected'));
            document.querySelector(`[data-q="${qIndex}"][data-o="${oIndex}"]`).classList.add('selected');
        }

        function setFeedback(qIndex, feedback) {
            userFeedback[`question_${qIndex}`] = feedback;
            document.querySelectorAll(`.question-card:nth-child(${qIndex + 1}) .feedback-btn`).forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function submitQuiz() {
            if (!currentQuizId) { alert('请先生成测验'); return; }
            const answers = Object.entries(userAnswers).map(([idx, ans]) => ({
                question_index: parseInt(idx),
                answer: ans
            }));
            try {
                const data = await apiCall(`/quizzes/${currentQuizId}/submit`, {
                    method: 'POST',
                    body: JSON.stringify({ answers })
                });
                alert(`提交成功！得分: ${data.score}，掌握度: ${(data.mastery_after * 100).toFixed(0)}%`);
            } catch (error) {
                alert('提交失败: ' + error.message);
            }
        }

        async function submitFeedback() {
            if (!currentQuizId) { alert('请先生成测验'); return; }
            if (Object.keys(userFeedback).length === 0) { alert('请先选择反馈'); return; }
            try {
                await apiCall(`/quizzes/${currentQuizId}/feedback`, {
                    method: 'POST',
                    body: JSON.stringify(userFeedback)
                });
                alert('反馈已提交！');
            } catch (error) {
                alert('提交失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
