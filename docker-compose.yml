services:
  postgres:
    image: postgres:16-alpine
    container_name: xueba-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xueba
      POSTGRES_PASSWORD: xueba
      POSTGRES_DB: xueba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xueba"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
